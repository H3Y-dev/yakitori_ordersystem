<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>焼き鳥注文システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --charcoal:#1c1815; --charcoal-2:#26201c; --ember:#e8622c; --ember-2:#c94f20;
    --amber:#f2a65a; --cream:#f4ede4; --smoke:#8a8178; --ready:#6fae5c; --ready-2:#5a9048;
    --line:#3a322c; --danger:#d94b4b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--charcoal); color:var(--cream);
    font-family:'Zen Kaku Gothic New',sans-serif; overscroll-behavior:none;}
  #root{min-height:100vh; display:flex; flex-direction:column;}

  .topbar{padding:14px 16px; background:linear-gradient(180deg,var(--charcoal-2),var(--charcoal));
    border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:10;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .mark{width:34px; height:34px; border-radius:8px;
    background:linear-gradient(135deg,var(--ember),var(--ember-2));
    display:flex; align-items:center; justify-content:center; font-size:18px;}
  .brand .title{font-weight:900; font-size:16px;}
  .brand .subtitle{font-size:11px; color:var(--smoke); margin-top:1px;}
  .role-badge{font-size:11px; font-weight:700; padding:5px 10px; border-radius:100px;
    background:rgba(242,166,90,0.12); color:var(--amber); border:1px solid rgba(242,166,90,0.3);}
  .switch-btn{background:none; border:none; color:var(--smoke); font-size:11px;
    text-decoration:underline; cursor:pointer; padding:4px;}

  .select-screen{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:28px;}
  .select-hero{text-align:center;}
  .select-hero .kanji{font-size:15px; color:var(--ember); font-weight:700; letter-spacing:0.15em; margin-bottom:6px;}
  .select-hero h1{font-size:26px; margin:0; font-weight:900;}
  .select-hero p{color:var(--smoke); font-size:13px; margin-top:8px;}
  .role-options{display:flex; flex-direction:column; gap:14px; width:100%; max-width:340px;}
  .role-card{background:var(--charcoal-2); border:1.5px solid var(--line); border-radius:16px;
    padding:20px; text-align:left; cursor:pointer; color:var(--cream);
    display:flex; align-items:center; gap:14px; transition:transform .08s;}
  .role-card:active{transform:scale(0.98);}
  .role-card.order{border-color:rgba(242,166,90,0.4);}
  .role-card.grill{border-color:rgba(232,98,44,0.4);}
  .role-icon{font-size:28px; width:48px; height:48px; border-radius:12px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .role-card.order .role-icon{background:rgba(242,166,90,0.15);}
  .role-card.grill .role-icon{background:rgba(232,98,44,0.15);}
  .role-card .role-name{font-weight:900; font-size:16px;}
  .role-card .role-desc{font-size:12px; color:var(--smoke); margin-top:3px;}
  .reset-link{margin-top:6px; background:none; border:none; color:var(--line);
    font-size:11px; text-decoration:underline; cursor:pointer;}

  .screen{flex:1; padding:14px 14px 120px 14px; overflow-y:auto;}
  .section-label{font-size:12px; font-weight:700; color:var(--smoke); letter-spacing:0.08em; margin:18px 4px 8px;}
  .section-label:first-child{margin-top:4px;}

  .num-input{width:100%; background:var(--charcoal-2); border:1.5px solid var(--line); border-radius:12px;
    padding:14px; color:var(--cream); font-size:22px; font-weight:900; text-align:center;
    font-family:inherit; font-variant-numeric:tabular-nums; letter-spacing:0.05em;}
  .num-input:focus{outline:none; border-color:var(--ember);}
  .num-input.is-dupe{border-color:var(--danger);}
  .num-warn{font-size:11px; color:#ef7c7c; margin-top:6px; text-align:center;}
  .num-warn.is-hidden{display:none;}
  .cart-num{font-size:15px; font-weight:900; color:var(--amber); font-variant-numeric:tabular-nums;}
  .cart-num.is-empty{color:var(--danger); font-size:12px; font-weight:700;}
  .menu-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .menu-item{background:var(--charcoal-2); border:1.5px solid var(--line); border-radius:14px;
    padding:12px; display:flex; flex-direction:column; gap:7px;}
  .menu-item .mname{font-weight:700; font-size:14px;}
  .menu-item .mprice{font-size:12px; color:var(--amber); font-weight:700; margin-top:-3px;}
  .stepper{display:flex; align-items:center; justify-content:space-between; background:var(--charcoal); border-radius:10px; padding:4px;}
  .stepper button{width:38px; height:38px; border-radius:8px; border:none; background:var(--line);
    color:var(--cream); font-size:19px; font-weight:700; cursor:pointer;}
  .stepper button.plus{background:var(--ember); color:var(--charcoal);}
  .stepper .qty{font-size:18px; font-weight:900; min-width:26px; text-align:center;}

  .cart-bar{position:fixed; bottom:0; left:0; right:0; max-width:600px; margin:0 auto;
    background:var(--charcoal-2); border-top:1px solid var(--line);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    display:flex; align-items:center; gap:12px; z-index:20;}
  .cart-info{flex:1; font-size:12px; color:var(--smoke);}
  .cart-info b{color:var(--cream); font-size:14px;}
  .submit-btn{background:linear-gradient(135deg,var(--ember),var(--ember-2)); color:white; border:none;
    padding:15px 24px; border-radius:12px; font-weight:900; font-size:15px; cursor:pointer;
    box-shadow:0 4px 14px rgba(232,98,44,0.35);}
  .submit-btn:disabled{opacity:0.35; box-shadow:none;}

  .ticket{background:var(--charcoal-2); border-radius:14px; padding:14px; margin-bottom:10px;
    border-left:4px solid var(--line);}
  .ticket.status-new{border-left-color:var(--danger);}
  .ticket-top{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px;}
  .ticket-num{font-size:22px; font-weight:900; font-variant-numeric:tabular-nums;}
  .ticket-num::before{content:"No."; font-size:11px; color:var(--smoke); font-weight:700; margin-right:2px;}
  .ticket-time{font-size:11px; color:var(--smoke); font-variant-numeric:tabular-nums;}
  .ticket-items{font-size:15px; line-height:1.6;}
  .ticket-items .qty{color:var(--amber); font-weight:900;}
  .ticket-edited{display:inline-block; font-size:10px; font-weight:700; color:var(--amber);
    background:rgba(242,166,90,0.15); padding:2px 7px; border-radius:100px; margin-left:6px;}
  .ticket-action{margin-top:10px; width:100%; border:none; padding:14px; border-radius:10px;
    font-weight:900; font-size:15px; cursor:pointer;}
  .ticket-action.done{background:var(--ready); color:var(--charcoal);}
  .ticket-sub-actions{display:flex; gap:8px; margin-top:8px;}
  .ticket-sub-actions button{flex:1; border:none; padding:9px; border-radius:9px;
    font-size:12px; font-weight:700; cursor:pointer; background:var(--line); color:var(--cream);}
  .ticket-sub-actions button.danger{background:rgba(217,75,75,0.18); color:#ef7c7c;}
  .empty-state{color:var(--smoke); text-align:center; padding:30px 10px; font-size:13px;}

  .wait-box{background:linear-gradient(135deg,rgba(232,98,44,0.14),rgba(242,166,90,0.08));
    border:1px solid rgba(242,166,90,0.35); border-radius:14px; padding:12px 14px; margin-bottom:14px;}
  .wait-box.is-default{border-color:var(--line); background:rgba(255,255,255,0.03);}
  .wait-main{display:flex; align-items:baseline; gap:4px; flex-wrap:wrap;}
  .wait-label{font-size:13px; color:var(--cream); font-weight:700;}
  .wait-value{font-size:18px; font-weight:900; color:var(--amber);}
  .wait-box.is-default .wait-value{color:var(--cream);}
  .wait-sub{font-size:11px; color:var(--smoke); margin-top:4px;}

  .done-banner{background:linear-gradient(135deg,var(--ready),var(--ready-2)); border-radius:16px;
    padding:14px; margin-bottom:16px; box-shadow:0 4px 18px rgba(111,174,92,0.4);}
  .done-head{display:flex; align-items:center; gap:8px; font-weight:900; font-size:14px; color:white; margin-bottom:10px;}
  .done-pulse{display:inline-block; animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);} 50%{transform:scale(1.2);}}
  .done-row{background:rgba(0,0,0,0.18); border-radius:12px; padding:10px 12px; margin-top:8px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .done-left{min-width:0;}
  .done-num{font-size:26px; font-weight:900; color:white; line-height:1.1; font-variant-numeric:tabular-nums;}
  .done-num::before{content:"No."; font-size:11px; opacity:0.8; margin-right:2px;}
  .done-items{font-size:12px; color:rgba(255,255,255,0.9); margin-top:2px;}
  .done-btn{flex-shrink:0; background:white; color:var(--ready-2); border:none; border-radius:10px;
    padding:11px 16px; font-weight:900; font-size:13px; cursor:pointer;}

  .modal-back{position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;}
  .modal{background:var(--charcoal-2); width:100%; max-width:600px; border-radius:18px 18px 0 0;
    padding:18px 16px calc(18px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;}
  .modal-title{font-size:16px; font-weight:900; margin-bottom:4px;}
  .modal-sub{font-size:12px; color:var(--smoke); margin-bottom:14px;}
  .modal .section-label{margin:14px 2px 8px;}
  .modal .num-input{margin-bottom:0;}
  .modal-actions{display:flex; gap:10px; margin-top:16px;}
  .modal-actions button{flex:1; border:none; padding:14px; border-radius:12px; font-weight:900; font-size:14px; cursor:pointer;}
  .modal-cancel{background:var(--line); color:var(--cream);}
  .modal-save{background:linear-gradient(135deg,var(--ember),var(--ember-2)); color:white;}

  .history-toggle{background:none; border:1px solid var(--line); color:var(--smoke); font-size:12px;
    padding:10px; border-radius:10px; width:100%; cursor:pointer; margin-top:8px;}
  .log-item{font-size:12px; color:var(--smoke); padding:8px 10px; border-bottom:1px solid var(--line); line-height:1.5;}
  .log-item .log-time{color:var(--line); font-size:10px;}
  .log-item .log-act{font-weight:700;}
  .log-item .log-act.create{color:var(--amber);}
  .log-item .log-act.edit{color:var(--ember);}
  .log-item .log-act.done{color:var(--ready);}
  .log-item .log-act.cancel{color:var(--danger);}

  @media (min-width:601px){ #root{max-width:600px; margin:0 auto; border-left:1px solid var(--line); border-right:1px solid var(--line);} }
</style>
</head>
<body>
<div id="root"></div>
<script>
// ===== 設定 =====
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMQtuPCopEBw-fkmbG5pq__OJPbJK03TmoR4aJoY93Rnb3MdoCARu5E7id7zLNmat7/exec";
const MENU = [
  {name:"塩コショウ", price:150, skewers:1},
  {name:"タレ", price:150, skewers:1},
  {name:"塩コショウ5本セット", price:700, skewers:5},
  {name:"タレ5本セット", price:700, skewers:5},
];
const DEFAULT_SEC_PER_SKEWER = 90; // 実績が少ないうちの仮の目安（1本あたり秒）
const MIN_DONE_FOR_ESTIMATE = 3;   // 完了実績がこれ未満なら「仮の目安」扱い

// ===== 状態 =====
let state = {
  role: null,          // 'order' | 'grill'
  orders: [],          // {id, number, items:[{name,qty}], status:'new'|'done', createdAt, doneAt, edited}
  seq: 0,              // 注文番号の採番用
  rev: 0,              // データの版（書き込みごとに増える。反映ラグ対策）
  log: [],             // {at, action:'create'|'edit'|'done'|'cancel', number, detail}
  cart: {},
  orderNumber: '',     // 受付で手入力する注文番号（整理券の番号など）
  now: Date.now(),
  showLog: false,
  editing: null,       // 訂正中 {id, cart, number}
};
let knownIds = new Set();
let firstLoad = true;
let pendingWrites = 0;
let lastSnapshot = '';
let myRev = 0;         // 自分が最後に確定させた版

// ===== 通信 =====
async function apiGet(){
  const res = await fetch(APPS_SCRIPT_URL, {method:'GET'});
  if(!res.ok) throw new Error('サーバーエラー: ' + res.status);
  const d = await res.json();
  if(Array.isArray(d)) return {orders:[], seq:0, rev:0, log:[]}; // 旧形式は無視して初期化
  return {orders:d.orders||[], seq:d.seq||0, rev:d.rev||0, log:d.log||[]};
}
async function apiSave(data){
  const res = await fetch(APPS_SCRIPT_URL, {
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(data),
  });
  if(!res.ok) throw new Error('サーバーエラー: ' + res.status);
  const r = await res.json();
  if(!r || r.ok !== true) throw new Error('保存に失敗しました');
  return r;
}

// 押した瞬間に画面へ反映し、保存は裏で行う（失敗時のみ元に戻す）
async function mutate(fn){
  const prev = {orders:state.orders, seq:state.seq, rev:state.rev, log:state.log};
  const next = fn({orders:state.orders, seq:state.seq, rev:state.rev, log:state.log});
  next.rev = (state.rev || 0) + 1;      // 版を1つ進める
  myRev = next.rev;
  state.orders = next.orders; state.seq = next.seq; state.rev = next.rev; state.log = next.log;
  lastSnapshot = JSON.stringify(next.orders) + '|' + JSON.stringify(next.log);
  render();
  pendingWrites++;
  try{
    await apiSave({orders:next.orders, seq:next.seq, rev:next.rev, log:next.log});
  }catch(err){
    state.orders = prev.orders; state.seq = prev.seq; state.rev = prev.rev; state.log = prev.log;
    myRev = prev.rev;
    lastSnapshot = JSON.stringify(prev.orders) + '|' + JSON.stringify(prev.log);
    render();
    alert('保存に失敗しました。もう一度お試しください。\n\n理由: ' + (err&&err.message?err.message:String(err)));
  }finally{
    pendingWrites--;
  }
}

async function poll(){
  if(pendingWrites > 0) return;   // 書き込み中は上書きしない
  if(state.editing) return;       // 訂正モーダルを開いている間は触らない
  try{
    const d = await apiGet();
    // 自分が確定させた版より古いデータは、サーバーの反映ラグなので無視する
    if((d.rev||0) < myRev) return;
    const snapshot = JSON.stringify(d.orders) + '|' + JSON.stringify(d.log);
    checkAlerts(d.orders);
    state.orders = d.orders; state.seq = d.seq; state.rev = d.rev||0; state.log = d.log;
    state.now = Date.now();
    myRev = state.rev;
    // 前回と内容が同じなら再描画しない（画面のチラつき防止）
    if(snapshot !== lastSnapshot){
      lastSnapshot = snapshot;
      render();
    }
  }catch(e){ console.error('取得エラー:', e); }
}

function checkAlerts(orders){
  if(firstLoad){
    orders.forEach(o=>knownIds.add(o.id+':'+o.status));
    firstLoad = false; return;
  }
  orders.forEach(o=>{
    const key = o.id+':'+o.status;
    if(!knownIds.has(key)){
      knownIds.add(key);
      if(state.role==='grill' && o.status==='new') beep();     // 焼き台：新規注文
      if(state.role==='order' && o.status==='done') beep();    // 注文側：完了通知
    }
  });
}

function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type='sine'; osc.frequency.value=880;
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    osc.start(); osc.stop(ctx.currentTime+0.4);
  }catch(e){}
  try{ if(navigator.vibrate) navigator.vibrate([120,80,120]); }catch(e){}
}

// 未お渡しの完了注文が残る間は繰り返し鳴らす（注文側の聞き逃し防止）
setInterval(()=>{
  if(state.role==='order' && state.orders.some(o=>o.status==='done')) beep();
}, 9000);

// ===== ヘルパ =====
function el(tag, props={}, children=[]){
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(v===null||v===undefined) return;
    if(k==='class') e.className=v;
    else if(k==='html') e.innerHTML=v;
    else if(k==='disabled') e.disabled=!!v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    e.appendChild(typeof c==='string' ? document.createTextNode(c) : c);
  });
  return e;
}
function itemsText(items){ return items.map(i=>`${i.name}×${i.qty}`).join('　'); }
function itemsHtml(items){ return itemsText(items).replace(/×(\d+)/g,'<span class="qty">×$1</span>'); }
function cartToItems(cart){ return MENU.filter(m=>cart[m.name]>0).map(m=>({name:m.name, qty:cart[m.name]})); }
function cartCount(cart){ return Object.values(cart).reduce((a,b)=>a+b,0); }
function cartTotal(cart){ return MENU.reduce((s,m)=>s+(cart[m.name]||0)*m.price,0); }
function elapsed(ts){ const s=Math.max(0,Math.floor((state.now-ts)/1000)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')} 経過`; }
function timeStr(ts){ const d=new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

// 注文の串本数
function orderSkewers(o){
  return o.items.reduce((s,i)=>{
    const m = MENU.find(x=>x.name===i.name);
    return s + i.qty * (m ? m.skewers : 1);
  }, 0);
}
// 完了実績から「1本あたり平均秒」を算出（なければnull）
function avgSecPerSkewer(){
  const done = state.orders.filter(o=>o.status==='done' && o.doneAt!=null && o.createdAt!=null);
  if(done.length < MIN_DONE_FOR_ESTIMATE) return null;
  let totalSec=0, totalSkewers=0;
  done.forEach(o=>{ totalSec += (o.doneAt-o.createdAt)/1000; totalSkewers += orderSkewers(o); });
  if(totalSkewers===0) return null;
  return totalSec/totalSkewers;
}
// 未完了の全注文の合計串本数
function pendingSkewers(){
  return state.orders.filter(o=>o.status==='new').reduce((s,o)=>s+orderSkewers(o),0);
}
function formatWait(sec){
  if(sec < 30) return 'まもなく';
  if(sec < 60) return '1分未満';
  return `約${Math.round(sec/60)}分`;
}

// ===== 操作 =====
async function submitOrder(){
  const number = state.orderNumber.trim();
  if(number===''){ alert('注文番号を入力してください。'); return; }
  const items = cartToItems(state.cart);
  if(items.length===0) return;
  const dupe = state.orders.some(o=>String(o.number)===number);
  if(dupe && !confirm(`番号 ${number} は現在対応中の注文で既に使われています。\nこのまま送信しますか？`)) return;
  const now = Date.now();
  state.cart = {};
  state.orderNumber = '';
  await mutate(d=>{
    const order = {id:'o'+now+Math.random().toString(36).slice(2,6), number, items, status:'new', createdAt:now, edited:false};
    return {
      orders:[...d.orders, order],
      seq:d.seq,
      log:[...d.log, {at:now, action:'create', number, detail:itemsText(items)}],
    };
  });
}

async function markDone(id){
  const now = Date.now();
  await mutate(d=>{
    const t = d.orders.find(o=>o.id===id);
    const orders = d.orders.map(o=>o.id===id?{...o, status:'done', doneAt:now}:o);
    const log = t ? [...d.log, {at:now, action:'done', number:t.number, detail:itemsText(t.items)}] : d.log;
    return {orders, seq:d.seq, log};
  });
}

async function saveEdit(id, newItems, newNumberRaw){
  if(newItems.length===0){ alert('商品が選ばれていません。取り消す場合は取消ボタンを使ってください。'); return; }
  const newNumber = (newNumberRaw||'').trim();
  if(newNumber===''){ alert('注文番号を入力してください。'); return; }
  // 自分以外に同じ番号があれば確認
  const dupe = state.orders.some(o=>o.id!==id && String(o.number)===newNumber);
  if(dupe && !confirm(`番号 ${newNumber} は他の対応中の注文で使われています。\nこのまま保存しますか？`)) return;

  const now = Date.now();
  state.editing = null;
  await mutate(d=>{
    const t = d.orders.find(o=>o.id===id);
    const orders = d.orders.map(o=>o.id===id?{...o, number:newNumber, items:newItems, edited:true}:o);
    let detail = '';
    if(t){
      const numChanged = String(t.number)!==newNumber;
      const parts = [];
      if(numChanged) parts.push(`番号 ${t.number}→${newNumber}`);
      parts.push(itemsText(t.items)+' → '+itemsText(newItems));
      detail = parts.join(' / ');
    }
    const log = t ? [...d.log, {at:now, action:'edit', number:newNumber, detail}] : d.log;
    return {orders, seq:d.seq, log};
  });
}

async function cancelOrder(id){
  const t = state.orders.find(o=>o.id===id);
  if(!t) return;
  if(!confirm(`No.${t.number} の注文を取り消しますか？`)) return;
  const now = Date.now();
  await mutate(d=>({
    orders: d.orders.filter(o=>o.id!==id),
    seq: d.seq,
    log: [...d.log, {at:now, action:'cancel', number:t.number, detail:itemsText(t.items)}],
  }));
}

async function resetAll(){
  if(!confirm('全ての注文データを削除します。よろしいですか？')) return;
  const alsoLog = confirm('入力履歴（ログ）も一緒に削除しますか？\n\nOK＝ログも削除 / キャンセル＝注文だけ削除して履歴は残す');
  knownIds = new Set();
  await mutate(d=>({orders:[], seq:0, log: alsoLog?[]:d.log}));
}

// ===== 描画 =====
function render(){
  const root = document.getElementById('root');
  // 再描画で入力中のフォーカスが飛ばないよう控えておく
  const active = document.activeElement;
  let focusKey = null, selStart = null, selEnd = null;
  if(active && active.tagName==='INPUT' && active.dataset && active.dataset.focusKey){
    focusKey = active.dataset.focusKey;
    try{ selStart=active.selectionStart; selEnd=active.selectionEnd; }catch(e){}
  }
  root.innerHTML = '';
  if(!state.role){ root.appendChild(roleSelect()); }
  else if(state.role==='order'){ root.appendChild(topbar('注文入力')); root.appendChild(orderScreen()); }
  else { root.appendChild(topbar('焼き台')); root.appendChild(grillScreen()); }
  if(state.editing) root.appendChild(editModal());
  if(focusKey){
    const again = root.querySelector('input[data-focus-key="'+focusKey+'"]');
    if(again){ again.focus({preventScroll:true}); if(selStart!==null){ try{ again.setSelectionRange(selStart,selEnd); }catch(e){} } }
  }
}

function topbar(label){
  return el('div',{class:'topbar'},[
    el('div',{class:'brand'},[
      el('div',{class:'mark'},'🍢'),
      el('div',{},[ el('div',{class:'title'},'焼き鳥注文システム'), el('div',{class:'subtitle'},'学校祭 出店') ]),
    ]),
    el('div',{style:'display:flex;align-items:center;gap:8px;'},[
      el('div',{class:'role-badge'},label),
      el('button',{class:'switch-btn', onClick:()=>{state.role=null; render();}},'役割変更'),
    ]),
  ]);
}

function roleSelect(){
  return el('div',{class:'select-screen'},[
    el('div',{class:'select-hero'},[
      el('div',{class:'kanji'},'祭 · 焼 · 提'),
      el('h1',{},'焼き鳥注文システム'),
      el('p',{},'このスマホの役割を選んでください'),
    ]),
    el('div',{class:'role-options'},[
      el('div',{class:'role-card order', onClick:()=>{state.role='order'; render();}},[
        el('div',{class:'role-icon'},'📋'),
        el('div',{},[ el('div',{class:'role-name'},'注文入力'), el('div',{class:'role-desc'},'お客さんの注文を入力する') ]),
      ]),
      el('div',{class:'role-card grill', onClick:()=>{state.role='grill'; render();}},[
        el('div',{class:'role-icon'},'🔥'),
        el('div',{},[ el('div',{class:'role-name'},'焼き台'), el('div',{class:'role-desc'},'注文を見て焼く・完了する') ]),
      ]),
    ]),
    el('button',{class:'reset-link', onClick:resetAll},'（本番前テスト用）全データを削除'),
  ]);
}

// ---- 注文入力画面 ----
function orderScreen(){
  const screen = el('div',{class:'screen'});
  const doneOrders = state.orders.filter(o=>o.status==='done').sort((a,b)=>b.doneAt-a.doneAt);
  const cooking = state.orders.filter(o=>o.status==='new').sort((a,b)=>a.createdAt-b.createdAt);

  // 完了バナー（入力欄より上、見やすく）
  if(doneOrders.length){
    const banner = el('div',{class:'done-banner'},[
      el('div',{class:'done-head'},[ el('span',{class:'done-pulse'},'✅'), el('span',{},`焼き上がり（${doneOrders.length}件）お客様にお渡し`) ]),
    ]);
    doneOrders.forEach(o=>{
      banner.appendChild(el('div',{class:'done-row'},[
        el('div',{class:'done-left'},[
          el('div',{class:'done-num'},String(o.number)),
          el('div',{class:'done-items'}, itemsText(o.items)),
        ]),
        el('button',{class:'done-btn', onClick:()=>cancelOrder(o.id)},'お渡し完了'),
      ]));
    });
    screen.appendChild(banner);
  }

  // 注文番号
  screen.appendChild(el('div',{class:'section-label'},'注文番号'));
  const num = state.orderNumber.trim();
  const dupe = num!=='' && state.orders.some(o=>String(o.number)===num);
  screen.appendChild(el('input',{
    class:'num-input'+(dupe?' is-dupe':''),
    type:'text', inputmode:'numeric', placeholder:'例: 12',
    value: state.orderNumber, 'data-focus-key':'ordernum',
    onInput:(e)=>{ state.orderNumber=e.target.value; updateNumberUi(); },
  }));
  screen.appendChild(el('div',{class:'num-warn'+(dupe?'':' is-hidden')},'⚠ この番号は現在対応中の注文で使われています'));

  // メニュー
  screen.appendChild(el('div',{class:'section-label'},'メニューを選ぶ'));
  const grid = el('div',{class:'menu-grid'});
  MENU.forEach(m=>{
    const q = state.cart[m.name]||0;
    grid.appendChild(el('div',{class:'menu-item'},[
      el('div',{class:'mname'},m.name),
      el('div',{class:'mprice'}, m.price+'円'),
      el('div',{class:'stepper'},[
        el('button',{onClick:()=>{state.cart[m.name]=Math.max(0,q-1); render();}},'−'),
        el('div',{class:'qty'},String(q)),
        el('button',{class:'plus', onClick:()=>{state.cart[m.name]=q+1; render();}},'＋'),
      ]),
    ]));
  });
  screen.appendChild(grid);

  // 待ち時間予測（今から注文するお客さんの目安）
  screen.appendChild(waitEstimateBox('今から注文の場合の目安: ', pendingSkewers()));

  // 調理中の注文（訂正・取消できる）
  screen.appendChild(el('div',{class:'section-label'},`調理中の注文（${cooking.length}件）`));
  if(cooking.length===0){
    screen.appendChild(el('div',{class:'empty-state'},'調理中の注文はありません'));
  }else{
    cooking.forEach(o=>{
      screen.appendChild(el('div',{class:'ticket status-new'},[
        el('div',{class:'ticket-top'},[
          el('div',{class:'ticket-num'},String(o.number)),
          el('div',{class:'ticket-time', 'data-elapsed':String(o.createdAt)}, elapsed(o.createdAt)),
        ]),
        el('div',{class:'ticket-items', html: itemsHtml(o.items) + (o.edited?'<span class="ticket-edited">訂正済</span>':'')}),
        el('div',{class:'ticket-sub-actions'},[
          el('button',{onClick:()=>openEdit(o.id)},'✏️ 訂正'),
          el('button',{class:'danger', onClick:()=>cancelOrder(o.id)},'取消'),
        ]),
      ]));
    });
  }

  // 履歴
  screen.appendChild(el('button',{class:'history-toggle', onClick:()=>{state.showLog=!state.showLog; render();}},
    state.showLog?'入力履歴を隠す':`入力履歴を表示（${state.log.length}件）`));
  if(state.showLog){
    const box = el('div',{});
    [...state.log].reverse().slice(0,50).forEach(l=>{
      const label = {create:'新規',edit:'訂正',done:'完了',cancel:'取消'}[l.action]||l.action;
      box.appendChild(el('div',{class:'log-item'},[
        el('span',{class:'log-time'}, timeStr(l.at)+'  '),
        el('span',{class:'log-act '+l.action}, `[${label}] No.${l.number} `),
        document.createTextNode(l.detail||''),
      ]));
    });
    screen.appendChild(box);
  }

  // カートバー
  const cnt = cartCount(state.cart);
  const numReady = state.orderNumber.trim()!=='';
  const bar = el('div',{class:'cart-bar'},[
    el('div',{class:'cart-info'},[
      numReady
        ? el('div',{class:'cart-num'}, 'No.'+state.orderNumber.trim())
        : el('div',{class:'cart-num is-empty'}, '番号を入力'),
      el('div',{},[
        document.createTextNode('選択中: '), el('b',{},cnt+'点'),
        document.createTextNode('　合計 '), el('b',{}, cartTotal(state.cart).toLocaleString()+'円'),
      ]),
    ]),
    el('button',{class:'submit-btn', disabled: (cnt===0||!numReady), onClick:submitOrder},'注文を送信'),
  ]);
  const wrap = el('div',{});
  wrap.appendChild(screen); wrap.appendChild(bar);
  return wrap;
}

// 番号入力中はフルレンダーせず、関係する部分だけ更新（フォーカス維持）
function updateNumberUi(){
  const num = state.orderNumber.trim();
  const dupe = num!=='' && state.orders.some(o=>String(o.number)===num);
  const input = document.querySelector('.num-input');
  if(input) input.classList.toggle('is-dupe', dupe);
  const warn = document.querySelector('.num-warn');
  if(warn) warn.classList.toggle('is-hidden', !dupe);
  const cnt = cartCount(state.cart);
  const btn = document.querySelector('.submit-btn');
  if(btn) btn.disabled = (cnt===0 || num==='');
}

// ---- 焼き台画面 ----
function grillScreen(){
  const screen = el('div',{class:'screen'});
  const cooking = state.orders.filter(o=>o.status==='new').sort((a,b)=>a.createdAt-b.createdAt);

  screen.appendChild(waitEstimateBox('今抱えている注文の消化目安: ', pendingSkewers()));

  screen.appendChild(el('div',{class:'section-label'},`焼く注文（${cooking.length}件）`));
  if(cooking.length===0){
    screen.appendChild(el('div',{class:'empty-state'},'新しい注文はありません'));
  }else{
    cooking.forEach(o=>{
      screen.appendChild(el('div',{class:'ticket status-new'},[
        el('div',{class:'ticket-top'},[
          el('div',{class:'ticket-num'},String(o.number)),
          el('div',{class:'ticket-time', 'data-elapsed':String(o.createdAt)}, elapsed(o.createdAt)),
        ]),
        el('div',{class:'ticket-items', html: itemsHtml(o.items) + (o.edited?'<span class="ticket-edited">訂正済</span>':'')}),
        el('button',{class:'ticket-action done', onClick:()=>markDone(o.id)},'焼き上がり・完了'),
      ]));
    });
  }
  return screen;
}

// 待ち時間予測ボックス
function waitEstimateBox(label, skewers){
  const avg = avgSecPerSkewer();
  const usingDefault = avg===null;
  const secPer = usingDefault ? DEFAULT_SEC_PER_SKEWER : avg;
  const seconds = skewers * secPer;
  return el('div',{class:'wait-box'+(usingDefault?' is-default':'')},[
    el('div',{class:'wait-main'},[
      el('span',{},'⏱ '),
      el('span',{class:'wait-label'}, label),
      el('span',{class:'wait-value'}, skewers===0 ? '待ちなし' : formatWait(seconds)),
    ]),
    el('div',{class:'wait-sub'}, usingDefault
      ? `実績収集中のため仮の目安（1本${DEFAULT_SEC_PER_SKEWER}秒換算・残り${skewers}本）`
      : `実績平均：1本あたり約${Math.round(avg)}秒（残り${skewers}本）`),
  ]);
}

// ---- 訂正モーダル ----
function openEdit(id){
  const o = state.orders.find(x=>x.id===id);
  if(!o) return;
  const cart = {};
  o.items.forEach(i=>{ cart[i.name] = i.qty; });
  state.editing = {id, cart, number: String(o.number)};
  render();
}

function editModal(){
  const o = state.orders.find(x=>x.id===state.editing.id);
  if(!o){ state.editing=null; return el('div',{}); }
  const cart = state.editing.cart;

  // 番号の重複チェック（自分以外で同じ番号があるか）
  const num = (state.editing.number||'').trim();
  const dupe = num!=='' && state.orders.some(x=>x.id!==o.id && String(x.number)===num);

  const grid = el('div',{class:'menu-grid'});
  MENU.forEach(m=>{
    const q = cart[m.name]||0;
    grid.appendChild(el('div',{class:'menu-item'},[
      el('div',{class:'mname'},m.name),
      el('div',{class:'mprice'}, m.price+'円'),
      el('div',{class:'stepper'},[
        el('button',{onClick:()=>{cart[m.name]=Math.max(0,q-1); render();}},'−'),
        el('div',{class:'qty'},String(q)),
        el('button',{class:'plus', onClick:()=>{cart[m.name]=q+1; render();}},'＋'),
      ]),
    ]));
  });

  const numInput = el('input',{
    class:'num-input'+(dupe?' is-dupe':''),
    type:'text', inputmode:'numeric', placeholder:'注文番号',
    value: state.editing.number, 'data-focus-key':'editnum',
    onInput:(e)=>{ state.editing.number = e.target.value; updateEditNumUi(); },
  });

  return el('div',{class:'modal-back', onClick:(e)=>{ if(e.target.classList.contains('modal-back')){state.editing=null; render();} }},[
    el('div',{class:'modal'},[
      el('div',{class:'modal-title'},`No.${o.number} を訂正`),
      el('div',{class:'modal-sub'},'番号や数量を直して保存すると、焼き台にすぐ反映されます'),
      el('div',{class:'section-label', style:'margin-top:0;'},'注文番号'),
      numInput,
      el('div',{class:'num-warn edit-num-warn'+(dupe?'':' is-hidden')},'⚠ この番号は他の対応中の注文で使われています'),
      el('div',{class:'section-label'},'内容'),
      grid,
      el('div',{class:'modal-actions'},[
        el('button',{class:'modal-cancel', onClick:()=>{state.editing=null; render();}},'やめる'),
        el('button',{class:'modal-save', onClick:()=>saveEdit(o.id, cartToItems(cart), state.editing.number)},'保存'),
      ]),
    ]),
  ]);
}

// 訂正モーダルの番号入力中に、重複警告だけを軽く更新（フォーカス維持）
function updateEditNumUi(){
  if(!state.editing) return;
  const num = (state.editing.number||'').trim();
  const o = state.orders.find(x=>x.id===state.editing.id);
  const dupe = num!=='' && o && state.orders.some(x=>x.id!==o.id && String(x.number)===num);
  const input = document.querySelector('.modal .num-input');
  if(input) input.classList.toggle('is-dupe', dupe);
  const warn = document.querySelector('.edit-num-warn');
  if(warn) warn.classList.toggle('is-hidden', !dupe);
}

// ===== 起動 =====
render();
poll();
setInterval(poll, 2500);

// 1秒ごと：全体は再描画せず、経過時間の表示だけ書き換える（チラつき防止）
setInterval(()=>{
  state.now = Date.now();
  if(!state.role) return;
  document.querySelectorAll('.ticket-time[data-elapsed]').forEach(elm=>{
    const ts = Number(elm.getAttribute('data-elapsed'));
    if(ts) elm.textContent = elapsed(ts);
  });
}, 1000);
</script>
